# Manual code-coverage workflow for orleans-rust-client on the uranus
# gnostr-cloud instance. Manual trigger only.
#
# orleans-rust-client is dual-language (Rust client + .NET Orleans bridge), so
# this runs on the .NET-extended runner image — which also carries the Rust
# toolchain + cargo-llvm-cov — and measures BOTH halves, merging them into one
# combined coverage % + a single /coverage drilldown. All the real logic lives
# in scripts/ci/coverage-run.sh (wrkflw mangles complex inline run: scripts).
#
# Trigger:
#   NOSTR_PRIVATE_KEY=$(tr -d '\n' < /home/ms/info-at-monumental.systems.hex) \
#     gnostr-cloud-cli ci enqueue \
#       a684e920e475ae9535a26256a3fccf0f0e67650156ea6542bc0baab983e7c1ca/orleans-rust-client \
#       --workflow .gnostr-cloud-coverage.yml --runs-on dgx-00 \
#       --host d0b51eaeb289cda95c969f9a70ee76c15c4fa084a055037919beef5613ef1caf
name: coverage

on:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: dgx-00
    container:
      image: gnostr-cloud-workflow-runner-dotnet:latest
      # Persist sccache + cargo's registry/git cache across job containers so
      # the Rust half doesn't recompile the world every run. The image already
      # exports RUSTC_WRAPPER=sccache, CARGO_HOME=/cache/cargo,
      # SCCACHE_DIR=/cache/sccache. CARGO_TARGET_DIR (/cache/target) is left
      # unmounted on purpose: `cargo llvm-cov clean` wipes it each run anyway,
      # so sccache (per-rustc-call) is where the win is.
      volumes:
        - /home/ms/.gnostr-cloud/ci-cache/sccache:/cache/sccache
        - /home/ms/.gnostr-cloud/ci-cache/cargo:/cache/cargo
    timeout-minutes: 60
    steps:
      - name: rust + .NET coverage, emit marker, upload drilldown
        run: |
          WS="${GITHUB_WORKSPACE}"; [ -d "$WS" ] || WS=/github/workspace; cd "$WS"
          bash scripts/ci/coverage-run.sh
